name: Publish to npm

on:
  push:
    tags:
      - "release-*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^release-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match release-x.y.z, current: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:prod

      - name: Check package version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#release-}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) must match package.json version (${PACKAGE_VERSION})"
            exit 1
          fi

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
